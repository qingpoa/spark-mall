server:
  port: 8081

spring:
  application:
    name: user-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  config:
    import: optional:classpath:application-${spring.profiles.active}-private.yml
  cloud:
    nacos:
      discovery:
        enabled: false
        server-addr: ${app.nacos.server-addr:127.0.0.1:8848}
        namespace: ${app.nacos.namespace:}
        group: ${app.nacos.group:DEFAULT_GROUP}
      config:
        enabled: false
        server-addr: ${app.nacos.server-addr:127.0.0.1:8848}
        namespace: ${app.nacos.namespace:}
        group: ${app.nacos.group:DEFAULT_GROUP}
        file-extension: yaml
  datasource:
    url: jdbc:mysql://${app.datasource.host}:${app.datasource.port}/${app.datasource.name}?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    username: ${app.datasource.username}
    password: ${app.datasource.password}
    driver-class-name: ${app.datasource.driver-class-name:com.mysql.cj.jdbc.Driver}
  data:
    redis:
      host: ${app.redis.host}
      port: ${app.redis.port}
      password: ${app.redis.password:}
      database: ${app.redis.database:0}
      timeout: ${app.redis.timeout:5s}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

app:
  security:
    jwt:
      secret: ${app.security.jwt.secret:change-this-jwt-secret-to-a-secure-value-2026}
      issuer: ${app.security.jwt.issuer:sparkle-shop}
      expiration-seconds: ${app.security.jwt.expiration-seconds:7200}

management:
  endpoints:
    web:
      exposure:
        include: health,info
