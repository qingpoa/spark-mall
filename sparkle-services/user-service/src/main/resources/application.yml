server:
  port: 8081

spring:
  application:
    name: user-service
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  config:
    import: optional:classpath:application-${spring.profiles.active}-private.yml
  cloud:
    nacos:
      discovery:
        enabled: false
        server-addr: ${app.nacos.server-addr:127.0.0.1:8848}
        namespace: ${app.nacos.namespace:}
        group: ${app.nacos.group:DEFAULT_GROUP}
      config:
        enabled: false
        server-addr: ${app.nacos.server-addr:127.0.0.1:8848}
        namespace: ${app.nacos.namespace:}
        group: ${app.nacos.group:DEFAULT_GROUP}
        file-extension: yaml
  datasource:
    url: jdbc:mysql://${app.datasource.host}:${app.datasource.port}/${app.datasource.name}?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    username: ${app.datasource.username}
    password: ${app.datasource.password}
    driver-class-name: ${app.datasource.driver-class-name:com.mysql.cj.jdbc.Driver}
  data:
    redis:
      host: ${app.redis.host}
      port: ${app.redis.port}
      password: ${app.redis.password:}
      database: ${app.redis.database:0}
      timeout: ${app.redis.timeout:5s}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

app:
  security:
    jwt:
      secret: change-this-jwt-secret-to-a-secure-value-2026
      issuer: sparkle-shop
      expiration-seconds: 7200

management:
  endpoints:
    web:
      exposure:
        include: health,info
aliyun:
  oss:
    endpoint: oss-cn-beijing.aliyuncs.com
    bucket-name: ${aliyun.oss.Bucket_Name}
    accessKeyId: ${Access_Key_Id}
    accessKeySecret: ${Access_Key_Secret}
    domain: https://${aliyun.oss.Bucket_Name}.oss-cn-beijing.aliyuncs.com
