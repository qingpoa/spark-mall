server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false
    gateway:
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/v1/user/**
        - id: product-service
          uri: lb://product-service
          predicates:
            - Path=/api/v1/product/**
        - id: cart-service
          uri: lb://cart-service
          predicates:
            - Path=/api/v1/cart/**
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/v1/order/**
        - id: stock-service
          uri: lb://stock-service
          predicates:
            - Path=/api/v1/stock/**
        - id: coupon-service
          uri: lb://coupon-service
          predicates:
            - Path=/api/v1/coupon/**

management:
  endpoints:
    web:
      exposure:
        include: health,info
